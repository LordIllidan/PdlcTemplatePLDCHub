name: PDLC Issue routing

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post routing comment
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pwsh ./scripts/ci/Post-IssueRouteComment.ps1
